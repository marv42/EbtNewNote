[versions]
code = "9000"
name = "0.90.0"
minSdk = "33"
compileSdk = "36"
targetSdk = "36"

# dependencies
aboutlibrariesVersion = "11.2.3"
acraVersion = "5.13.1"
appcompatVersion = "1.7.1"
coreVersion = "1.18.0"
cyclonedxVersion = "1.10.0"
daggerVersion = "2.59.2"
datastoreVersion = "1.2.1"
dependencyCheckVersion = "12.2.0"
exifinterfaceVersion = "1.4.2"
fragmentVersion = "1.8.9"
gsonVersion = "2.13.2"
kotlinxCoroutinesCore = "1.10.2"
